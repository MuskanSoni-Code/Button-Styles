<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expand SearchBar</title>
  </head>
  <style>
    * {
      margin: 0%;
      padding: 0%;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: antiquewhite;
    }
    input {
      padding: 5px;
    }
    input:hover {
      padding: 5px 70px;
    }
  </style>
  <body>
    <input type="search" placeholder="Search" />
  </body>
</html>
