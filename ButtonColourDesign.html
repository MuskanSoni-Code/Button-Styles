<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Colour Design</title>
  </head>
  <style>
    * {
      margin: 0%;
      padding: 0%;
      box-sizing: border-box;
    }
    body {
      background-color: rgb(44, 44, 44);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    div {
      width: 150px;
      padding: 12px;
      font-size: 18px;
      text-align: center;
      border: 4px solid transparent;
      border-radius: 20px;
      border-image: linear-gradient(90deg, yellow, red, purple) 1;
      color: white;
      background-color: black;
    }
    div:hover {
      border-image: linear-gradient(90deg, purple, red, yellow) 1;
    }
  </style>
  <body>
    <div>Start Coding !</div>
  </body>
</html>
